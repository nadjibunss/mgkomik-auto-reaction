<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>MGKomik Auto Reaction</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:Arial;background:#0d0d1a;color:#fff;padding:16px;}
.card{background:#16213e;border-radius:14px;padding:20px;margin-bottom:14px;}
h2{color:#e94560;font-size:18px;margin-bottom:12px;text-align:center;}
.row{display:flex;gap:8px;margin-bottom:10px;align-items:center;}
label{font-size:12px;color:#8892a4;min-width:80px;}
input,select{background:#0f3460;border:1px solid #333;border-radius:8px;padding:8px 10px;color:#fff;font-size:13px;flex:1;}
.btn{background:#e94560;color:white;border:none;padding:13px;border-radius:10px;font-size:15px;font-weight:bold;cursor:pointer;width:100%;margin-top:4px;}
.btn:disabled{opacity:.4;}
.btn-stop{background:#444;margin-top:8px;}
.btn-warn{background:#e67e22;margin-top:8px;}
#log{background:#0a0a1a;border-radius:10px;padding:12px;height:300px;overflow-y:auto;font-size:11px;font-family:monospace;line-height:1.7;}
.ok{color:#6fcf97;}.err{color:#f47f7f;}.info{color:#f9c74f;}.hi{color:#56cfe1;}
.stat{display:flex;gap:10px;margin-bottom:14px;}
.s{background:#0f3460;border-radius:8px;padding:10px;flex:1;text-align:center;font-size:12px;}
.s b{display:block;font-size:22px;color:#e94560;}
.notice{background:#2d1a00;border:1px solid #e67e22;border-radius:10px;padding:12px;font-size:12px;color:#f9c74f;margin-bottom:14px;line-height:1.8;}
</style>
</head>
<body>

<div class="notice">
  &#9888; <b>PENTING:</b> Buka file ini dari <b>web.mgkomik.cc</b>!<br>
  Caranya: buka Chrome &rarr; pergi ke <b>web.mgkomik.cc</b> &rarr; baru buka file ini.<br>
  Atau: upload ke server lalu akses via URL http://...
</div>

<div class="card">
  <h2>&#129302; MGKomik Auto Reaction</h2>

  <div class="row">
    <label>Reaction</label>
    <input id="react" value="upvote" placeholder="upvote,funny,love">
  </div>
  <div class="row">
    <label>Delay (ms)</label>
    <input id="delay" value="1500" type="number">
  </div>
  <div class="row">
    <label>Max Komik</label>
    <input id="maxKomik" value="0" type="number" placeholder="0 = semua">
  </div>

  <button class="btn" id="btnStart" onclick="startBot()">&#9654; Jalankan Bot</button>
  <button class="btn btn-stop" id="btnStop" onclick="stopBot()" style="display:none;">&#9632; Stop</button>
  <button class="btn btn-warn" onclick="openMGKomik()">&#127760; Buka di web.mgkomik.cc</button>
</div>

<div class="stat">
  <div class="s"><b id="cKomik">0</b>Komik</div>
  <div class="s"><b id="cChapter">0</b>Chapter</div>
  <div class="s"><b id="cReact">0</b>Reaction</div>
</div>

<div class="card" style="padding:12px;">
  <div id="log"><span class="info">Siap. Tekan Jalankan Bot.</span></div>
</div>

<script>
const BASE   = 'https://web.mgkomik.cc';
const KOMEN  = 'https://komentar.mgkomik.cc';
const LIST   = BASE + '/komik/';

let running = false;
let stats = {komik:0, chapter:0, react:0};

function log(msg, cls='') {
  const el = document.getElementById('log');
  const d = document.createElement('div');
  d.className = cls;
  d.textContent = msg;
  el.appendChild(d);
  el.scrollTop = el.scrollHeight;
}

function updateStats() {
  document.getElementById('cKomik').textContent = stats.komik;
  document.getElementById('cChapter').textContent = stats.chapter;
  document.getElementById('cReact').textContent = stats.react;
}

function sleep(ms) { return new Promise(r => setTimeout(r, ms)); }
function rand(arr) { return arr[Math.floor(Math.random()*arr.length)]; }
function reactions() { return document.getElementById('react').value.split(',').map(x=>x.trim()).filter(Boolean); }

function openMGKomik() {
  // Buka halaman mgkomik dan embed tool ini via bookmark
  window.location.href = BASE + '/komik/';
}

async function get(url) {
  try {
    const r = await fetch(url, {credentials:'include'});
    if (!r.ok) { log('    [!] HTTP '+r.status+': '+url, 'err'); return null; }
    return await r.text();
  } catch(e) {
    log('    [!] Fetch error: '+e.message, 'err');
    return null;
  }
}

async function post(url, data) {
  try {
    const r = await fetch(url, {
      method: 'POST',
      credentials: 'include',
      headers: {'Content-Type':'application/json','X-Requested-With':'XMLHttpRequest'},
      body: JSON.stringify(data)
    });
    return r.status === 200 ? await r.text() : null;
  } catch(e) { return null; }
}

async function getKomikList() {
  const list = [];
  const maxK = parseInt(document.getElementById('maxKomik').value)||0;
  let page = 1;
  while (running) {
    const url = page===1 ? LIST : LIST+'?page='+page;
    log('[PAGE '+page+'] Mengambil daftar komik...', 'hi');
    const html = await get(url);
    if (!html) break;
    const doc = new DOMParser().parseFromString(html,'text/html');
    const title = doc.title||'';
    if (/(just a moment|cloudflare|tunggu sebentar)/i.test(title)) {
      log('[!] CF block! Pastikan file dibuka dari web.mgkomik.cc', 'err'); break;
    }
    let links = [];
    const sels = ['.bsx a','.bs a','.listupd a','.utao a','article a','.lds a','.anmt a','.lsx a'];
    for (const sel of sels) {
      doc.querySelectorAll(sel).forEach(a => {
        const h = a.href||'';
        if (h.includes('/komik/') && !h.includes('/chapter') && !h.endsWith('/komik/') && !list.includes(h) && !links.includes(h)) links.push(h);
      });
      if (links.length) break;
    }
    if (!links.length) {
      doc.querySelectorAll('a[href]').forEach(a => {
        const h = a.href||'';
        if (h.includes('/komik/') && !h.includes('/chapter') && !h.endsWith('/komik/') && !list.includes(h) && !links.includes(h)) links.push(h);
      });
    }
    if (!links.length) { log('[!] Halaman '+page+' kosong, selesai listing.','info'); break; }
    log('    [✓] '+links.length+' komik ditemukan', 'ok');
    list.push(...links);
    if (maxK > 0 && list.length >= maxK) { list.splice(maxK); break; }
    page++;
    await sleep(1500);
  }
  return list;
}

async function getChapters(url) {
  const html = await get(url);
  if (!html) return [];
  const doc = new DOMParser().parseFromString(html,'text/html');
  let chs = [];
  const sels = ['#chapterlist a','.eplister a','.cl a','li.wp-manga-chapter a','a[href*="/chapter"]'];
  for (const sel of sels) {
    doc.querySelectorAll(sel).forEach(a => {
      const h = a.href||'';
      if (h.includes('/chapter') && !chs.includes(h)) chs.push(h);
    });
    if (chs.length) break;
  }
  return chs.sort();
}

async function sendReaction(url, reaction) {
  const html = await get(url);
  if (!html) return false;
  const doc = new DOMParser().parseFromString(html,'text/html');

  let postId = null;
  for (const attr of ['data-post-id','data-id','data-manga-id']) {
    const el = doc.querySelector('['+attr+']');
    if (el) { postId = el.getAttribute(attr); break; }
  }
  if (!postId) {
    doc.querySelectorAll('script').forEach(sc => {
      if (postId) return;
      const m = (sc.textContent||'').match(/["']?(?:post_id|postId)["']?[\s:=>'"]+([\d]{3,})/);
      if (m) postId = m[1];
    });
  }
  if (!postId) {
    const sl = doc.querySelector('link[rel="shortlink"]');
    if (sl) { const m = sl.href.match(/p=(\d+)/); if(m) postId=m[1]; }
  }
  if (!postId) postId = url.replace(/\/$/,'').split('/').pop();

  const reactionMap = {upvote:1,funny:2,love:3,surprised:4,angry:5,sad:6};
  const rid = reactionMap[reaction]||1;

  const apis = [
    BASE+'/api/reaction',
    BASE+'/wp-json/manga/v1/reaction',
    BASE+'/wp-admin/admin-ajax.php',
  ];
  for (const api of apis) {
    const res = await post(api, {post_id: postId, reaction: rid, action:'manga_reaction'});
    if (res !== null) {
      log('    [✓] '+reaction+' pid='+postId+' → '+res.slice(0,60), 'ok');
      stats.react++; updateStats();
      return true;
    }
  }
  log('    [✗] Gagal reaction: '+url.split('/').pop(), 'err');
  return false;
}

async function startBot() {
  // Cek apakah running dari domain yang benar
  if (!location.hostname.includes('mgkomik') && !location.hostname.includes('localhost') && location.protocol !== 'http:') {
    const ok = confirm('Peringatan: Bot ini sebaiknya dibuka dari domain web.mgkomik.cc agar cookies terbawa.\nLanjutkan quand meme?');
    if (!ok) return;
  }

  running = true;
  stats = {komik:0,chapter:0,react:0};
  updateStats();
  document.getElementById('btnStart').disabled = true;
  document.getElementById('btnStop').style.display = 'block';
  document.getElementById('log').innerHTML = '';

  const rxns = reactions();
  const delay = parseInt(document.getElementById('delay').value)||1500;

  log('='.repeat(38),'hi');
  log('  MGKomik Auto Reaction Bot','hi');
  log('  Reactions: '+rxns.join(', '),'info');
  log('  Domain: '+location.hostname,'info');
  log('='.repeat(38),'hi');

  // Test akses dulu
  log('\n[*] Test akses web.mgkomik.cc...','info');
  const test = await get(LIST);
  if (!test) {
    log('[X] Tidak bisa akses. Buka dulu dari web.mgkomik.cc!','err');
    stopBot(); return;
  }
  const testDoc = new DOMParser().parseFromString(test,'text/html');
  if (/(just a moment|cloudflare)/i.test(testDoc.title||'')) {
    log('[X] CF block! Buka file ini dari tab web.mgkomik.cc','err');
    stopBot(); return;
  }
  log('[✓] Akses OK: '+testDoc.title,'ok');

  // Listing
  log('\n[*] Mengambil daftar komik...','info');
  const komikList = await getKomikList();
  log('[*] Total: '+komikList.length+' komik','info');

  if (!komikList.length) {
    log('[X] Tidak ada komik ditemukan.','err');
    stopBot(); return;
  }

  for (let i=0; i<komikList.length && running; i++) {
    const url = komikList[i];
    const name = url.replace(/\/$/,'').split('/').pop();
    stats.komik++; updateStats();
    log('\n['+(i+1)+'/'+komikList.length+'] '+name,'hi');

    const r1 = rand(rxns);
    await sendReaction(url, r1);
    await sleep(delay);

    const chs = await getChapters(url);
    log('    Chapter: '+chs.length,'');
    for (let j=0; j<chs.length && running; j++) {
      stats.chapter++; updateStats();
      const r2 = rand(rxns);
      log('    ['+(j+1)+'/'+chs.length+'] '+chs[j].split('/').pop()+' → '+r2,'');
      await sendReaction(chs[j], r2);
      await sleep(delay);
    }
  }

  log('\n'+'='.repeat(38),'hi');
  log('SELESAI! Komik:'+stats.komik+' Reaction:'+stats.react,'ok');
  log('='.repeat(38),'hi');
  stopBot();
}

function stopBot() {
  running = false;
  document.getElementById('btnStart').disabled = false;
  document.getElementById('btnStop').style.display = 'none';
}
</script>
</body>
</html>
